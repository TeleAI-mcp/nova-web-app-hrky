name: Auto-close completed issues

on:
  issues:
    types: [labeled]

jobs:
  close-completed:
    runs-on: ubuntu-latest
    steps:
      - name: Close issue if labeled as completed
        if: github.event.label.name == 'completed'
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'close-issue'
          token: ${{ secrets.GITHUB_TOKEN }}
